<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📧 Email Triage Environment</title>
    <style>
        :root {
            --bg1: #0d1137;
            --bg2: #2d1852;
            --accent: #8b5cf6;
            --accent2: #22c55e;
            --text: #f8fafc;
            --surface: rgba(255, 255, 255, 0.08);
            --surface-strong: rgba(255, 255, 255, 0.14);
            --muted: #c7d2fe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(139,92,246,0.35), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(34,197,94,0.2), transparent 20%),
                        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
            overflow-x: hidden;
        }

        body {
            padding: 24px;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 28px;
            animation: floatIn 0.7s ease-out;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            padding: 10px 18px;
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 14px;
            box-shadow: 0 20px 80px rgba(15,23,42,0.15);
        }

        h1 {
            font-size: clamp(2.6rem, 5vw, 4rem);
            letter-spacing: -0.04em;
            margin-bottom: 12px;
            text-shadow: 0 20px 80px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: var(--muted);
            font-size: 1.05rem;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 24px;
        }

        @media (max-width: 960px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 28px;
            backdrop-filter: blur(18px);
            box-shadow: 0 40px 120px rgba(15,23,42,0.28);
            animation: floatIn 0.6s ease-out;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -40px;
            background: radial-gradient(circle at top left, rgba(99,102,241,0.14), transparent 22%),
                        radial-gradient(circle at bottom right, rgba(16,185,129,0.12), transparent 18%);
            opacity: 0.7;
            pointer-events: none;
        }

        .card > * {
            position: relative;
            z-index: 1;
        }

        .card h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            font-size: 1.35rem;
            color: #eef2ff;
        }

        .card h2::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.12);
            margin-left: 16px;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        button {
            padding: 14px 22px;
            border: none;
            border-radius: 18px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        button:hover {
            transform: translateY(-3px) scale(1.005);
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #38bdf8);
            color: white;
            box-shadow: 0 18px 40px rgba(56,189,248,0.22);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.12);
            color: #f8fafc;
            border: 1px solid rgba(255,255,255,0.14);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            color: white;
            box-shadow: 0 18px 40px rgba(34,197,94,0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f43f5e, #fb7185);
            color: white;
            box-shadow: 0 18px 40px rgba(244,63,94,0.2);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .email-container {
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
            animation: glowPulse 3s infinite ease-in-out;
        }

        .email-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .email-subject {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .email-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .badge-tier {
            background: rgba(59,130,246,0.16);
            color: #bfdbfe;
        }

        .badge-priority {
            background: rgba(248,113,113,0.16);
            color: #fecaca;
        }

        .email-body {
            color: #e2e8f0;
            margin-bottom: 16px;
            line-height: 1.75;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #c7d2fe;
            font-weight: 700;
            font-size: 0.94rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(15,23,42,0.85);
            color: #f8fafc;
            font-size: 0.96rem;
            transition: border-color 0.25s ease, transform 0.25s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(99,102,241,0.8);
            transform: translateY(-1px);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
        }

        textarea {
            min-height: 110px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .stat-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-4px);
        }

        .stat-value {
            font-size: 2.15rem;
            font-weight: 800;
            color: #f8fafc;
        }

        .stat-label {
            display: block;
            margin-top: 6px;
            color: #c7d2fe;
            font-size: 0.92rem;
            opacity: 0.95;
        }

        .queue-item {
            padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            margin-bottom: 12px;
            border-radius: 18px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .queue-item:hover {
            transform: translateX(6px);
            background: rgba(255,255,255,0.1);
        }

        .queue-item.active {
            background: rgba(56,189,248,0.14);
            border-color: rgba(56,189,248,0.25);
        }

        .history-item {
            padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            margin-bottom: 12px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .status-active {
            background: #22c55e;
            box-shadow: 0 0 0 6px rgba(34,197,94,0.08);
        }

        .notification {
            position: fixed;
            top: 24px;
            right: 24px;
            background: rgba(15,23,42,0.96);
            color: #eef2ff;
            padding: 16px 20px;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.1);
            animation: popIn 0.25s ease-out;
            z-index: 1000;
            max-width: 320px;
        }

        .notification.success {
            border-left: 4px solid #22c55e;
        }

        .notification.error {
            border-left: 4px solid #f43f5e;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: inset 0 0 0 0 rgba(99,102,241,0.15); }
            50% { box-shadow: inset 0 0 40px rgba(99,102,241,0.12); }
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
        <div class="background-blur"></div>
        <div class="container">
        <header>
            <div class="eyebrow">Live training board • Animated agent interface</div>
            <h1>📧 Email Triage Environment</h1>
            <p class="subtitle">Experience a more thrilling workflow simulator with neon gradients, motion, and real-time queue interaction.</p>
        </header>

        <div class="main-content">
            <!-- Email Display -->
            <div class="card">
                <h2>✉️ Current Email</h2>
                <div id="emailDisplay">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Click "Reset" to start</p>
                    </div>
                </div>
            </div>

            <!-- Actions Panel -->
            <div class="card">
                <h2>⚡ Actions</h2>
                
                <div class="form-group">
                    <label for="actionType">Action Type</label>
                    <select id="actionType">
                        <option value="classify">Classify</option>
                        <option value="prioritize">Prioritize</option>
                        <option value="respond">Respond</option>
                        <option value="close">Close</option>
                    </select>
                </div>

                <div id="dynamicFields"></div>

                <div class="button-group">
                    <button class="btn-success" id="submitBtn" onclick="submitAction()">Submit Action</button>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-value" id="stepCount">0</div>
                        <div class="stat-label">Steps</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="score">0.0</div>
                        <div class="stat-label">Score</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="queueSize">0</div>
                        <div class="stat-label">Queue</div>
                    </div>
                </div>
            </div>

            <!-- Queue and History -->
            <div class="card">
                <h2>📋 Queue</h2>
                <div id="queueDisplay" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <!-- Customer History -->
            <div class="card">
                <h2>🕐 History</h2>
                <div id="historyDisplay" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <!-- Controls -->
            <div class="card controls">
                <h2>🎮 Controls</h2>
                <div class="button-group">
                    <button class="btn-primary" onclick="resetEnv()">Reset Environment</button>
                    <button class="btn-secondary" id="autoStepBtn" onclick="toggleAutoStep()">Auto Step: Off</button>
                    <button class="btn-secondary" onclick="getScore()">Get Final Score</button>
                    <button class="btn-danger" onclick="clearUI()">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentState = null;
        let totalScore = 0;
        let autoStepRunning = false;
        let autoStepInterval = null;

        async function resetEnv() {
            try {
                stopAutoStep();
                const response = await fetch(`${API_BASE}/reset`, { method: 'POST' });
                if (!response.ok) throw new Error('Failed to reset');
                const data = await response.json();
                currentState = data;
                updateUI();
                showNotification('Environment reset successfully!', 'success');
            } catch (error) {
                showNotification('Error resetting environment: ' + error.message, 'error');
            }
        }

        async function submitAction() {
            if (!currentState) {
                showNotification('Reset environment first!', 'error');
                return;
            }

            const actionType = document.getElementById('actionType').value;
            const action = {
                action_type: actionType,
                email_id: currentState.current_email?.id || '',
                label: document.getElementById('labelSelect')?.value,
                priority: document.getElementById('prioritySelect')?.value,
                response: document.getElementById('responseInput')?.value
            };

            try {
                const response = await fetch(`${API_BASE}/step`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(action)
                });
                if (!response.ok) throw new Error('Failed to submit action');
                const data = await response.json();
                currentState = data.observation;
                totalScore += data.reward.score;
                updateUI();
                showNotification(`Action successful! Reward: ${data.reward.score.toFixed(2)}`, 'success');
            } catch (error) {
                showNotification('Error submitting action: ' + error.message, 'error');
            }
        }

        async function getScore() {
            try {
                const response = await fetch(`${API_BASE}/score`);
                if (!response.ok) throw new Error('Failed to get score');
                const data = await response.json();
                showNotification(`Final Score: ${data.final_score}`, 'success');
            } catch (error) {
                showNotification('Error getting score: ' + error.message, 'error');
            }
        }

        async function autoSubmitAction() {
            if (!currentState || !currentState.current_email) {
                stopAutoStep();
                return;
            }

            const actionTypes = ['classify', 'prioritize', 'respond', 'close'];
            const actionType = actionTypes[Math.floor(Math.random() * actionTypes.length)];
            
            let action = {
                action_type: actionType,
                email_id: currentState.current_email.id
            };

            if (actionType === 'classify') {
                const labels = ['billing', 'technical', 'feature', 'general'];
                action.label = labels[Math.floor(Math.random() * labels.length)];
            } else if (actionType === 'prioritize') {
                const priorities = ['low', 'medium', 'high'];
                action.priority = priorities[Math.floor(Math.random() * priorities.length)];
            } else if (actionType === 'respond') {
                action.response = 'Thank you for contacting us. We will assist you shortly.';
            }

            try {
                const response = await fetch(`${API_BASE}/step`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(action)
                });
                if (!response.ok) throw new Error('Failed to auto-submit');
                const data = await response.json();
                currentState = data.observation;
                totalScore += data.reward.score;
                updateUI();
            } catch (error) {
                showNotification('Error in auto-step: ' + error.message, 'error');
                stopAutoStep();
            }
        }

        function toggleAutoStep() {
            autoStepRunning = !autoStepRunning;
            const btn = document.getElementById('autoStepBtn');
            
            if (autoStepRunning) {
                btn.textContent = 'Auto Step: On';
                btn.style.background = 'linear-gradient(135deg, #22c55e, #14b8a6)';
                btn.style.boxShadow = '0 18px 40px rgba(34,197,94,0.2)';
                showNotification('Auto-step enabled (2s interval)', 'success');
                
                autoStepInterval = setInterval(() => {
                    autoSubmitAction();
                }, 2000);
            } else {
                stopAutoStep();
            }
        }

        function stopAutoStep() {
            autoStepRunning = false;
            const btn = document.getElementById('autoStepBtn');
            btn.textContent = 'Auto Step: Off';
            btn.style.background = 'rgba(255,255,255,0.12)';
            btn.style.boxShadow = 'none';
            
            if (autoStepInterval) {
                clearInterval(autoStepInterval);
                autoStepInterval = null;
            }
        }

        function updateUI() {
            if (!currentState) return;

            // Update email display
            const emailDisplay = document.getElementById('emailDisplay');
            if (currentState.current_email) {
                emailDisplay.innerHTML = `
                    <div class="email-container">
                        <div class="email-header">
                            <div class="email-subject">${currentState.current_email.subject}</div>
                        </div>
                        <div class="email-meta">
                            <span class="badge badge-tier">Tier: ${currentState.current_email.customer_tier}</span>
                        </div>
                        <div class="email-body">${currentState.current_email.body}</div>
                        <div style="color: #999; font-size: 0.9rem; margin-top: 10px;">
                            <strong>From:</strong> Customer ${currentState.current_email.customer_id}
                        </div>
                    </div>
                `;
            } else {
                emailDisplay.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><p>All emails processed!</p></div>';
            }

            // Update dynamic fields
            updateDynamicFields();

            // Update stats
            document.getElementById('stepCount').textContent = currentState.step_count;
            document.getElementById('score').textContent = totalScore.toFixed(2);
            document.getElementById('queueSize').textContent = currentState.queue.length;

            // Update queue
            const queueDisplay = document.getElementById('queueDisplay');
            if (currentState.queue.length > 0) {
                queueDisplay.innerHTML = currentState.queue.map((email, idx) => `
                    <div class="queue-item">
                        <span>${idx + 1}. ${email.subject}</span>
                        <span style="font-size: 0.85rem; color: #999;">${email.customer_id}</span>
                    </div>
                `).join('');
            } else {
                queueDisplay.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>Queue empty</p></div>';
            }

            // Update history
            const historyDisplay = document.getElementById('historyDisplay');
            if (Object.keys(currentState.history).length > 0) {
                let historyHTML = '';
                for (const [customerId, actions] of Object.entries(currentState.history)) {
                    historyHTML += `<div class="history-item"><strong>${customerId}:</strong> ${actions.join(' → ')}</div>`;
                }
                historyDisplay.innerHTML = historyHTML;
            } else {
                historyDisplay.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No history yet</p></div>';
            }
        }

        function updateDynamicFields() {
            const actionType = document.getElementById('actionType').value;
            const dynamicFields = document.getElementById('dynamicFields');
            
            let fieldsHTML = '';
            
            if (actionType === 'classify') {
                fieldsHTML = `
                    <div class="form-group">
                        <label for="labelSelect">Category</label>
                        <select id="labelSelect">
                            <option value="">Select category...</option>
                            <option value="billing">Billing</option>
                            <option value="technical">Technical</option>
                            <option value="feature">Feature</option>
                            <option value="general">General</option>
                        </select>
                    </div>
                `;
            } else if (actionType === 'prioritize') {
                fieldsHTML = `
                    <div class="form-group">
                        <label for="prioritySelect">Priority</label>
                        <select id="prioritySelect">
                            <option value="">Select priority...</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                `;
            } else if (actionType === 'respond') {
                fieldsHTML = `
                    <div class="form-group">
                        <label for="responseInput">Response</label>
                        <textarea id="responseInput" placeholder="Type your response here..."></textarea>
                    </div>
                `;
            }
            
            dynamicFields.innerHTML = fieldsHTML;
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function clearUI() {
            stopAutoStep();
            currentState = null;
            totalScore = 0;
            document.getElementById('emailDisplay').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Click "Reset" to start</p></div>';
            document.getElementById('stepCount').textContent = '0';
            document.getElementById('score').textContent = '0.0';
            document.getElementById('queueSize').textContent = '0';
            document.getElementById('queueDisplay').innerHTML = '<div class="empty-state" style="padding: 20px;"><p>Queue empty</p></div>';
            document.getElementById('historyDisplay').innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No history yet</p></div>';
        }

        // Update dynamic fields on action type change
        document.getElementById('actionType')?.addEventListener('change', updateDynamicFields);

        // Initialize
        updateDynamicFields();
        showNotification('Welcome! Click "Reset Environment" to begin', 'success');
    </script>
</body>
</html>
